<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary px-4">
    <a class="navbar-brand fw-bold" href="{% url 'book-list' %}">📖 Library MS</a>
    <div>
        <a href="{% url 'book-list' %}" class="btn btn-light btn-sm me-1">Books</a>
        <a href="{% url 'member-list' %}" class="btn btn-light btn-sm me-1">Members</a>
        <a href="{% url 'issue-book' %}" class="btn btn-warning btn-sm me-1">Issue Book</a>
        <a href="{% url 'issue-list' %}" class="btn btn-light btn-sm me-1">Issues</a>
        <a href="{% url 'overdue-books' %}" class="btn btn-danger btn-sm">Overdue</a>
    </div>
</nav>
<div class="container mt-4">
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
