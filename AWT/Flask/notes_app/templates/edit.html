{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-secondary text-white">
                <h5 class="mb-0">Edit Note</h5>
            </div>
            <div class="card-body">
                
                <!-- The action points to /edit/<id>. method=POST will trigger the update logic in app.py -->
                <form action="/edit/{{ note.id }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <!-- We pre-fill the value with the existing note.title -->
                        <input type="text" name="title" class="form-control" value="{{ note.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Content</label>
                        <!-- Textareas don't use the 'value' attribute, content goes between the tags -->
                        <textarea name="content" class="form-control" rows="5" required>{{ note.content }}</textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="/" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success">Update Note</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
