<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Quick Notes</title>
    <!-- We use Bootstrap 5 via CDN for quick, clean styling without writing CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">📝 Quick Notes</a>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="container">
        <!-- Jinja2 Block: Child templates will inject their specific content here -->
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
