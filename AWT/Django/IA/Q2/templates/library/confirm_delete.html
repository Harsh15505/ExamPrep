{% extends 'library/base.html' %}
{% block content %}

<div class="card border-danger mx-auto" style="max-width:500px">
  <div class="card-header bg-danger text-white"><h5>Confirm Delete</h5></div>
  <div class="card-body">
    <p>Are you sure you want to delete <strong>{{ object }}</strong>?</p>
    <form method="POST">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'book-list' %}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>

{% endblock %}
