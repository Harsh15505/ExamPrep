{% extends 'library/base.html' %}
{% block content %}

<h2>Issue a Book</h2>
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-header bg-warning"><h5>Issue Book to Member</h5></div>
      <div class="card-body">
        <form method="POST">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-warning w-100">Issue Book</button>
          <a href="{% url 'issue-list' %}" class="btn btn-secondary w-100 mt-2">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
